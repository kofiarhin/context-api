openapi: 3.1.0
info:
  title: Zoro Vercel Gateway — Configuration
  version: 1.0.0
  description: >-
    Governed Vercel environment-variable, domain, alias, and DNS configuration through the Context
    API. Environment-variable operations expose metadata only and never return decrypted values.
    Production-affecting operations require an explicit approval payload and destructive removals
    require an exact confirmation payload.
servers:
  - url: https://context-api-3b9dfadf403e.herokuapp.com
security:
  - bearerAuth: []
paths:
  /api/v1/vercel/projects/{project}/environment-variables:
    get:
      operationId: listVercelEnvironmentVariables
      summary: List environment-variable metadata without decrypted values
      parameters:
        - $ref: '#/components/parameters/Project'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          $ref: '#/components/responses/Success'
    post:
      operationId: createVercelEnvironmentVariable
      summary: Create an environment variable; Production targets require approval
      parameters:
        - $ref: '#/components/parameters/Project'
      requestBody:
        $ref: '#/components/requestBodies/ObjectBody'
      responses:
        '201':
          $ref: '#/components/responses/Success'
  /api/v1/vercel/projects/{project}/environment-variables/{variable}:
    patch:
      operationId: updateVercelEnvironmentVariable
      summary: Update an environment variable without returning its value
      parameters:
        - $ref: '#/components/parameters/Project'
        - $ref: '#/components/parameters/Variable'
      requestBody:
        $ref: '#/components/requestBodies/ObjectBody'
      responses:
        '200':
          $ref: '#/components/responses/Success'
    delete:
      operationId: deleteVercelEnvironmentVariable
      summary: Delete an environment variable with exact confirmation
      parameters:
        - $ref: '#/components/parameters/Project'
        - $ref: '#/components/parameters/Variable'
      requestBody:
        $ref: '#/components/requestBodies/DestructiveBody'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/v1/vercel/projects/{project}/domains:
    get:
      operationId: listVercelProjectDomains
      summary: List project domains
      parameters:
        - $ref: '#/components/parameters/Project'
      responses:
        '200':
          $ref: '#/components/responses/Success'
    post:
      operationId: addVercelProjectDomain
      summary: Add an allowlisted project domain
      parameters:
        - $ref: '#/components/parameters/Project'
      requestBody:
        $ref: '#/components/requestBodies/ObjectBody'
      responses:
        '201':
          $ref: '#/components/responses/Success'
  /api/v1/vercel/projects/{project}/domains/{domain}:
    get:
      operationId: getVercelProjectDomain
      summary: Get a project domain
      parameters:
        - $ref: '#/components/parameters/Project'
        - $ref: '#/components/parameters/Domain'
      responses:
        '200':
          $ref: '#/components/responses/Success'
    delete:
      operationId: removeVercelProjectDomain
      summary: Remove a project domain with exact confirmation
      parameters:
        - $ref: '#/components/parameters/Project'
        - $ref: '#/components/parameters/Domain'
      requestBody:
        $ref: '#/components/requestBodies/DestructiveBody'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/v1/vercel/projects/{project}/domains/{domain}/verify:
    post:
      operationId: verifyVercelProjectDomain
      summary: Verify a project domain with production approval
      parameters:
        - $ref: '#/components/parameters/Project'
        - $ref: '#/components/parameters/Domain'
      requestBody:
        $ref: '#/components/requestBodies/ProductionBody'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/v1/vercel/aliases:
    get:
      operationId: listVercelAliases
      summary: List aliases
      parameters:
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/v1/vercel/deployments/{deployment}/aliases:
    post:
      operationId: assignVercelAlias
      summary: Assign an allowlisted alias with production approval
      parameters:
        - $ref: '#/components/parameters/Deployment'
      requestBody:
        $ref: '#/components/requestBodies/ProductionBody'
      responses:
        '201':
          $ref: '#/components/responses/Success'
  /api/v1/vercel/aliases/{alias}:
    delete:
      operationId: deleteVercelAlias
      summary: Delete an alias with exact confirmation
      parameters:
        - $ref: '#/components/parameters/Alias'
      requestBody:
        $ref: '#/components/requestBodies/DestructiveBody'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/v1/vercel/domains/{domain}/config:
    get:
      operationId: getVercelDomainConfig
      summary: Inspect domain configuration
      parameters:
        - $ref: '#/components/parameters/Domain'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/v1/vercel/domains/{domain}/dns:
    get:
      operationId: listVercelDnsRecords
      summary: List DNS record metadata
      parameters:
        - $ref: '#/components/parameters/Domain'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          $ref: '#/components/responses/Success'
    post:
      operationId: createVercelDnsRecord
      summary: Create a DNS record with production approval
      parameters:
        - $ref: '#/components/parameters/Domain'
      requestBody:
        $ref: '#/components/requestBodies/ProductionBody'
      responses:
        '201':
          $ref: '#/components/responses/Success'
  /api/v1/vercel/domains/{domain}/dns/{record}:
    patch:
      operationId: updateVercelDnsRecord
      summary: Update a DNS record with production approval
      parameters:
        - $ref: '#/components/parameters/Domain'
        - $ref: '#/components/parameters/Record'
      requestBody:
        $ref: '#/components/requestBodies/ProductionBody'
      responses:
        '200':
          $ref: '#/components/responses/Success'
    delete:
      operationId: deleteVercelDnsRecord
      summary: Delete a DNS record with exact confirmation
      parameters:
        - $ref: '#/components/parameters/Domain'
        - $ref: '#/components/parameters/Record'
      requestBody:
        $ref: '#/components/requestBodies/DestructiveBody'
      responses:
        '200':
          $ref: '#/components/responses/Success'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Vercel Gateway bearer token supplied as ZORO_VERCEL_API_KEY.
  parameters:
    Project:
      name: project
      in: path
      required: true
      schema:
        type: string
    Deployment:
      name: deployment
      in: path
      required: true
      schema:
        type: string
    Variable:
      name: variable
      in: path
      required: true
      schema:
        type: string
    Domain:
      name: domain
      in: path
      required: true
      schema:
        type: string
    Alias:
      name: alias
      in: path
      required: true
      schema:
        type: string
    Record:
      name: record
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
  schemas:
    Approval:
      type: object
      additionalProperties: false
      required: [confirmed, scope, reason]
      properties:
        confirmed:
          type: boolean
          const: true
        scope:
          type: string
          const: production
        reason:
          type: string
          minLength: 8
        requestReference:
          type: string
    Confirmation:
      type: object
      additionalProperties: false
      required: [confirmed, resourceType, resourceId, reason]
      properties:
        confirmed:
          type: boolean
          const: true
        resourceType:
          type: string
        resourceId:
          type: string
        expectedName:
          type: string
        reason:
          type: string
          minLength: 8
    GenericObject:
      type: object
      additionalProperties: true
  requestBodies:
    ObjectBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GenericObject'
    ProductionBody:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/GenericObject'
              - type: object
                required: [approval]
                properties:
                  approval:
                    $ref: '#/components/schemas/Approval'
    DestructiveBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required: [confirmation]
            properties:
              confirmation:
                $ref: '#/components/schemas/Confirmation'
  responses:
    Success:
      description: Normalized Context API response
      content:
        application/json:
          schema:
            type: object
            properties:
              data: {}
              meta:
                type: object
