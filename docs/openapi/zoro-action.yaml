        '502': { $ref: '#/components/responses/UpstreamUnavailable' }

  /api/v1/github/pull-requests:
    post:
      tags: [github]
      operationId: createGithubPullRequest
      summary: Create a pull request
      description: Draft defaults to true.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [owner, repo, title, head, base]
              properties:
                owner: { type: string }
                repo: { type: string }
                title: { type: string, maxLength: 250 }
                body: { type: string }
                head: { type: string }
                base: { type: string }
                draft: { type: boolean, default: true }
                maintainerCanModify: { type: boolean, default: true }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/GithubPullRequest' }
                  meta: { $ref: '#/components/schemas/Meta' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UpstreamRejected' }
        '502': { $ref: '#/components/responses/UpstreamUnavailable' }

  /api/v1/github/pull-requests/{pullNumber}:
    get:
      tags: [github]
      operationId: getGithubPullRequest
      summary: Read a pull request
      description: >-
        mergeable may be null while GitHub is still computing mergeability. Do
        not treat null as mergeable.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/PullNumber' }
        - { $ref: '#/components/parameters/OwnerQuery' }
        - { $ref: '#/components/parameters/RepoQuery' }
      responses:
        '200':
          description: The pull request
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/GithubPullRequest' }
                  meta: { $ref: '#/components/schemas/Meta' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '502': { $ref: '#/components/responses/UpstreamUnavailable' }
    patch:
      tags: [github]
      operationId: updateGithubPullRequest
      summary: Update, close, or reopen a pull request
      description: At least one mutable property is required.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/PullNumber' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [owner, repo]
              properties:
                owner: { type: string }
                repo: { type: string }
                title: { type: string, maxLength: 250 }
                body: { type: string }
                state: { type: string, enum: [open, closed] }
                base: { type: string }
                maintainerCanModify: { type: boolean }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/GithubPullRequest' }
                  meta: { $ref: '#/components/schemas/Meta' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UpstreamRejected' }
        '502': { $ref: '#/components/responses/UpstreamUnavailable' }

  /api/v1/github/pull-requests/{pullNumber}/merge:
    post:
      tags: [github]
      operationId: mergeGithubPullRequest
      summary: Merge a pull request
      description: >-
        Requires the expected current head SHA; a stale SHA returns 409. Branch
        protection, required reviews, and required status checks remain
        authoritative and are never bypassed.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/PullNumber' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [owner, repo, expectedHeadSha, mergeMethod]
              properties:
                owner: { type: string }
                repo: { type: string }
                expectedHeadSha: { type: string }
                mergeMethod: { type: string, enum: [merge, squash, rebase] }
                commitTitle: { type: string, maxLength: 250 }
                commitMessage: { type: string }
      responses:
        '200':
          description: Merge attempted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/GithubMergeResult' }
                  meta: { $ref: '#/components/schemas/Meta' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UpstreamRejected' }
        '502': { $ref: '#/components/responses/UpstreamUnavailable' }
