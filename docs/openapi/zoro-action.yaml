        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '415': { $ref: '#/components/responses/UnsupportedContent' }
        '422': { $ref: '#/components/responses/UpstreamRejected' }
        '502': { $ref: '#/components/responses/UpstreamUnavailable' }
    delete:
      tags: [github]
      operationId: deleteGithubFile
      summary: Delete a file
      description: Requires the current blob SHA; a stale SHA returns 409.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [owner, repo, branch, path, sha, message]
              properties:
                owner: { type: string }
