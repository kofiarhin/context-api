openapi: 3.1.0

# Maintained source of truth for Zoro's Context API Action.
# Operation count: 27 (15 context + 12 GitHub), below the 30-operation limit.
# The schema must still be pasted into GPT Builder manually after repository verification.

info:
  title: Context API
  version: 1.2.0
  description: >-
    Structured profile, project, and task context plus an authenticated GitHub
    gateway. GitHub writes may target default branches, but workflow files,
    force pushes, branch-protection bypasses, secrets, Actions administration,
    repository administration, and collaborator management are unavailable.

servers:
  - url: https://context-api-3b9dfadf403e.herokuapp.com
    description: Production

security: []

tags:
  - name: health
  - name: profile
  - name: projects
  - name: tasks
  - name: github

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Configure ZORO_GITHUB_API_KEY in the GPT Action authentication panel.

  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema: { type: string }
    TaskId:
      name: taskId
      in: path
      required: true
      schema: { type: string }
    PullNumber:
      name: pullNumber
      in: path
      required: true
      schema: { type: integer, minimum: 1 }
    OwnerQuery:
      name: owner
      in: query
      required: true
      schema: { type: string }
    RepoQuery:
      name: repo
      in: query
      required: true
      schema: { type: string }
    Page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }
    PerPage:
      name: perPage
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 30 }

  schemas:
    Source:
      type: object
      additionalProperties: false
      required: [type]
      properties:
        type: { type: string }
        reference: { type: string }

    Profile:
      type: object
      additionalProperties: false
      properties:
        key: { type: string }
        displayName: { type: string }
        description: { type: string }
        professionalRoles: { type: array, items: { type: string } }
        preferredStack: { type: array, items: { type: string } }
        responsePreferences: { type: array, items: { type: string } }
        testingPreferences: { type: array, items: { type: string } }
        architecturePreferences: { type: array, items: { type: string } }
        communicationPreferences: { type: array, items: { type: string } }
        tags: { type: array, items: { type: string } }
        source: { $ref: '#/components/schemas/Source' }
        status: { type: string }
        version: { type: integer }

    Project:
      type: object
      additionalProperties: false
      properties:
        projectId: { type: string }
        name: { type: string }
        description: { type: string }
        status: { type: string }
        priority: { type: string }
        technologyStack: { type: array, items: { type: string } }
        tags: { type: array, items: { type: string } }
        source: { $ref: '#/components/schemas/Source' }
        version: { type: integer }

    Task:
      type: object
      additionalProperties: false
      properties:
        taskId: { type: string }
        title: { type: string }
        projectId: { type: string }
        description: { type: string }
        status:
          type: string
          enum: [backlog, ready, in-progress, blocked, done, archived]
        priority:
          type: string
          enum: [low, medium, high, critical]
        acceptanceCriteria: { type: array, items: { type: string } }
        dependencies: { type: array, items: { type: string } }
        tags: { type: array, items: { type: string } }
        source: { $ref: '#/components/schemas/Source' }

    GithubFileBody:
      type: object
      additionalProperties: false
      required: [owner, repo, branch, path, message]
      properties:
        owner: { type: string }
        repo: { type: string }
        branch: { type: string }
        path: { type: string, maxLength: 1024 }
        sha: { type: string, pattern: '^[0-9a-fA-F]{40}$' }
        content: { type: string, maxLength: 250000 }
        message: { type: string, minLength: 1, maxLength: 250 }

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  message: { type: string }
        correlationId: { type: string }
        meta:
          type: object
          additionalProperties: true

  responses:
    BadRequest:
      description: Validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Denied by server or repository policy
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Existing resource, stale SHA, or invalid state
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unsupported:
      description: Unsupported binary or large content
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Upstream:
      description: GitHub rejected or could not complete the request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

paths:
  /health:
    get:
      tags: [health]
      operationId: getHealth
      summary: Report service health
      responses:
        '200': { description: Healthy }

  /api/v1/profile:
    get:
      tags: [profile]
      operationId: getProfile
      summary: Read the profile
      responses:
        '200': { description: Profile }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [profile]
      operationId: createProfile
      summary: Create the profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Profile' }
      responses:
        '201': { description: Created }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
    patch:
      tags: [profile]
      operationId: updateProfile
      summary: Partially update the profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Profile' }
      responses:
        '200': { description: Updated }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [profile]
      operationId: deleteProfile
      summary: Archive the profile
      responses:
        '200': { description: Archived }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/projects:
    get:
      tags: [projects]
      operationId: listProjects
      summary: List projects
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: technology
          in: query
          schema: { type: string }
        - { $ref: '#/components/parameters/Page' }
      responses:
        '200': { description: Projects }
        '400': { $ref: '#/components/responses/BadRequest' }
    post:
      tags: [projects]
      operationId: createProject
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Project' }
      responses:
        '201': { description: Created }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/v1/projects/{projectId}:
    parameters:
      - { $ref: '#/components/parameters/ProjectId' }
    get:
      tags: [projects]
      operationId: getProject
      summary: Read a project
      responses:
        '200': { description: Project }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [projects]
      operationId: updateProject
      summary: Partially update a project
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Project' }
      responses:
        '200': { description: Updated }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [projects]
      operationId: deleteProject
      summary: Archive a project
      responses:
        '200': { description: Archived }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/tasks:
    get:
      tags: [tasks]
      operationId: listTasks
      summary: List tasks
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: projectId
          in: query
          schema: { type: string }
        - { $ref: '#/components/parameters/Page' }
      responses:
        '200': { description: Tasks }
        '400': { $ref: '#/components/responses/BadRequest' }
    post:
      tags: [tasks]
      operationId: createTask
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Task' }
      responses:
        '201': { description: Created }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/v1/tasks/{taskId}:
    parameters:
      - { $ref: '#/components/parameters/TaskId' }
    get:
      tags: [tasks]
      operationId: getTask
      summary: Read a task
      responses:
        '200': { description: Task }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [tasks]
      operationId: updateTask
      summary: Partially update a task
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Task' }
      responses:
        '200': { description: Updated }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [tasks]
      operationId: deleteTask
      summary: Archive a task
      responses:
        '200': { description: Archived }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/github/repositories:
    get:
      tags: [github]
      operationId: listGithubRepositories
      summary: List repositories available to the GitHub App installation
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PerPage' }
      responses:
        '200': { description: Repositories }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '502': { $ref: '#/components/responses/Upstream' }

  /api/v1/github/contents:
    get:
      tags: [github]
      operationId: getGithubContent
      summary: Read a UTF-8 file or list a directory
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OwnerQuery' }
        - { $ref: '#/components/parameters/RepoQuery' }
        - name: path
          in: query
          required: false
          schema: { type: string }
        - name: ref
          in: query
          required: false
          schema: { type: string }
      responses:
        '200': { description: File or directory }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '415': { $ref: '#/components/responses/Unsupported' }
        '502': { $ref: '#/components/responses/Upstream' }

  /api/v1/github/branches:
    get:
      tags: [github]
      operationId: listGithubBranches
      summary: List branches
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OwnerQuery' }
        - { $ref: '#/components/parameters/RepoQuery' }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PerPage' }
      responses:
        '200': { description: Branches }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '502': { $ref: '#/components/responses/Upstream' }
    post:
      tags: [github]
      operationId: createGithubBranch
      summary: Create a branch
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [owner, repo, branch]
              properties:
                owner: { type: string }
                repo: { type: string }
                branch: { type: string }
                baseRef: { type: string }
      responses:
        '201': { description: Created }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Upstream' }

  /api/v1/github/branches/{branch}:
    patch:
      tags: [github]
      operationId: updateGithubBranch
      summary: Fast-forward a branch without force
      security: [{ bearerAuth: [] }]
      parameters:
        - name: branch
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [owner, repo, expectedCurrentSha, newSha]
              properties:
                owner: { type: string }
                repo: { type: string }
                expectedCurrentSha: { type: string, pattern: '^[0-9a-fA-F]{40}$' }
                newSha: { type: string, pattern: '^[0-9a-fA-F]{40}$' }
      responses:
        '200': { description: Updated }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Upstream' }

  /api/v1/github/files:
    post:
      tags: [github]
      operationId: createGithubFile
      summary: Create a UTF-8 file
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - { $ref: '#/components/schemas/GithubFileBody' }
                - type: object
                  required: [content]
      responses:
        '201': { description: Created }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '415': { $ref: '#/components/responses/Unsupported' }
        '422': { $ref: '#/components/responses/Upstream' }
    patch:
      tags: [github]
      operationId: updateGithubFile
      summary: Replace a UTF-8 file using its current blob SHA
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - { $ref: '#/components/schemas/GithubFileBody' }
                - type: object
                  required: [sha, content]
      responses:
        '200': { description: Updated }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '415': { $ref: '#/components/responses/Unsupported' }
        '422': { $ref: '#/components/responses/Upstream' }
    delete:
      tags: [github]
      operationId: deleteGithubFile
      summary: Delete a file using its current blob SHA
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OwnerQuery' }
        - { $ref: '#/components/parameters/RepoQuery' }
        - name: branch
          in: query
          required: true
          schema: { type: string }
        - name: path
          in: query
          required: true
          schema: { type: string, maxLength: 1024 }
        - name: sha
          in: query
          required: true
          schema: { type: string, pattern: '^[0-9a-fA-F]{40}$' }
        - name: message
          in: query
          required: true
          schema: { type: string, minLength: 1, maxLength: 250 }
      responses:
        '200': { description: Deleted }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Upstream' }

  /api/v1/github/pull-requests:
    post:
      tags: [github]
      operationId: createGithubPullRequest
      summary: Create a pull request
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [owner, repo, title, head, base]
              properties:
                owner: { type: string }
                repo: { type: string }
                title: { type: string, maxLength: 250 }
                body: { type: string, maxLength: 65536 }
                head: { type: string }
                base: { type: string }
                draft: { type: boolean }
                maintainerCanModify: { type: boolean }
      responses:
        '201': { description: Created }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Upstream' }

  /api/v1/github/pull-requests/{pullNumber}:
    parameters:
      - { $ref: '#/components/parameters/PullNumber' }
    get:
      tags: [github]
      operationId: getGithubPullRequest
      summary: Read a pull request
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OwnerQuery' }
        - { $ref: '#/components/parameters/RepoQuery' }
      responses:
        '200': { description: Pull request }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '502': { $ref: '#/components/responses/Upstream' }
    patch:
      tags: [github]
      operationId: updateGithubPullRequest
      summary: Update or close a pull request
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [owner, repo]
              properties:
                owner: { type: string }
                repo: { type: string }
                title: { type: string, maxLength: 250 }
                body: { type: string, maxLength: 65536 }
                state: { type: string, enum: [open, closed] }
                base: { type: string }
                maintainerCanModify: { type: boolean }
      responses:
        '200': { description: Updated }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Upstream' }

  /api/v1/github/pull-requests/{pullNumber}/merge:
    post:
      tags: [github]
      operationId: mergeGithubPullRequest
      summary: Merge a pull request using its expected head SHA
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/PullNumber' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [owner, repo, expectedHeadSha, mergeMethod]
              properties:
                owner: { type: string }
                repo: { type: string }
                expectedHeadSha: { type: string, pattern: '^[0-9a-fA-F]{40}$' }
                mergeMethod: { type: string, enum: [merge, squash, rebase] }
                commitTitle: { type: string, maxLength: 250 }
                commitMessage: { type: string, maxLength: 65536 }
      responses:
        '200': { description: Merge result }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Upstream' }
